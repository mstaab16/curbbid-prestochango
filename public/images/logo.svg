<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Presto Change-Os Handywork wizard logo">
  <defs>
    <clipPath id="brimMask">
      <!-- everything below the wide hat brim — used to cut off the top of the head + eyes -->
      <rect x="0" y="92" width="200" height="200" />
    </clipPath>
  </defs>

  <!-- Wizard hat: tall, slightly droopy cone with a wide curved brim -->
  <g fill="currentColor">
    <!-- Cone of the hat -->
    <path d="M100 8
             C 96 30, 88 60, 78 90
             L 122 90
             C 112 60, 104 30, 100 8 Z" />
    <!-- Tip droop -->
    <path d="M100 8
             C 102 4, 108 4, 110 8
             C 110 14, 104 20, 100 22
             C 96 18, 96 12, 100 8 Z" />
    <!-- Wide curved brim -->
    <path d="M40 96
             C 60 86, 140 86, 160 96
             C 158 102, 140 108, 100 108
             C 60 108, 42 102, 40 96 Z" />
    <!-- Hat band shadow notch -->
    <path d="M70 92 L130 92 L128 96 L72 96 Z" opacity="0.55" />
  </g>

  <!-- Head + beard silhouette, clipped so brim hides forehead/eyes -->
  <g fill="currentColor" clip-path="url(#brimMask)">
    <!-- Head: oval looking slightly down -->
    <path d="M76 88
             C 76 78, 124 78, 124 88
             L 124 122
             C 124 130, 118 134, 112 134
             L 88 134
             C 82 134, 76 130, 76 122 Z" />
    <!-- Long beard flowing down past the chin -->
    <path d="M82 124
             C 82 130, 86 138, 90 144
             C 88 150, 90 158, 94 162
             C 92 168, 96 174, 100 178
             C 104 174, 108 168, 106 162
             C 110 158, 112 150, 110 144
             C 114 138, 118 130, 118 124
             C 116 132, 110 138, 100 140
             C 90 138, 84 132, 82 124 Z" />
    <!-- Subtle nose nub peeking under brim -->
    <path d="M97 116 L100 124 L103 116 Z" opacity="0.0" />
  </g>

  <!-- Circular sawblade behind/left -->
  <g transform="translate(48 130)">
    <!-- Tooth ring: 16 triangular teeth around a circle -->
    <g fill="currentColor">
      <circle cx="0" cy="0" r="22" />
      <g>
        <polygon points="0,-30 -3,-22 3,-22" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(22.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(45)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(67.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(90)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(112.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(135)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(157.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(180)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(202.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(225)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(247.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(270)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(292.5)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(315)" />
        <polygon points="0,-30 -3,-22 3,-22" transform="rotate(337.5)" />
      </g>
    </g>
    <!-- Center hole knockout -->
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
  </g>

  <!-- Hammer crossing in front, right side -->
  <g transform="translate(116 132) rotate(28)">
    <!-- Handle -->
    <rect x="-3" y="-2" width="58" height="6" fill="currentColor" />
    <!-- Hammer head -->
    <path d="M-22 -14 L 4 -14 L 4 -8 L 12 -8 L 12 12 L 4 12 L 4 6 L -22 6
             C -28 6, -30 2, -30 -4 C -30 -10, -28 -14, -22 -14 Z" fill="currentColor" />
    <!-- Claw notch -->
    <path d="M-22 -10 L -16 -4 L -22 2 Z" fill="#ffffff" />
  </g>
</svg>
