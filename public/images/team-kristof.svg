  <rect x="0" y="360" width="400" height="40" fill="#1f1f23"/>
  <text x="200" y="386" text-anchor="middle" font-family="'Orbitron', system-ui, sans-serif" font-size="14" font-weight="700" fill="#a8d977" letter-spacing="2">PRESTON KRISTOF</text>
</svg>
